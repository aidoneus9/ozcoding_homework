<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sign_up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nanum+Gothic&display=swap"
      rel="stylesheet"
    />
    <link href="sign_up.css" rel="stylesheet" />
  </head>
  <body>
    <div id="container">
      <form id="form" action="#">
        <table class="table">
          <tr>
            <th>아이디</th>
            <td>
              <input
                name="id"
                placeholder="아이디"
                autocomplete="off"
                required
              />
            </td>
          </tr>
          <tr>
            <th>비밀번호</th>
            <td>
              <!-- type이 password이면 노출되지 않도록 ⚫️로 표시됨-->
              <input
                type="password"
                name="pw1"
                placeholder="비밀번호"
                required
              />
            </td>
          </tr>
          <tr>
            <th>비밀번호 확인</th>
            <td>
              <!-- type이 password이면 노출되지 않도록 ⚫️로 표시됨-->
              <input
                type="password"
                name="pw2"
                placeholder="비밀번호"
                required
              />
            </td>
          </tr>
          <tr>
            <th>이름</th>
            <td>
              <input
                name="name"
                placeholder="이름"
                autocomplete="off"
                required
              />
            </td>
          </tr>
          <tr>
            <th>전화번호</th>
            <td>
              <input
                name="phone"
                placeholder="휴대전화 번호"
                autocomplete="off"
              />
            </td>
          </tr>
          <tr>
            <th>원하는 직무</th>
            <td>
              <select name="position">
                <!-- multiple, size -->
                <option value="full_stack">풀스택 개발자</option>
                <option value="back_end" selected>백엔드 개발자</option>
                <option value="front_end">프론트엔드 개발자</option>
                <option value="ux/ui_designer">UX/UI 디자이너</option>
                <option value="planner">기획자</option>
              </select>
            </td>
          </tr>
          <tr>
            <th>성별</th>
            <td>
              <label>
                <input type="radio" name="gender" value="female" checked />F
              </label>
              <label>
                <input type="radio" name="gender" value="male" />M
              </label>
            </td>
          </tr>
          <tr>
            <th>이메일</th>
            <td>
              <input
                name="email"
                title="유효한 이메일 계정을 입력해 주세요."
                autocomplete="off"
              />
            </td>
          </tr>
          <tr>
            <th>자기소개</th>
            <td>
              <textarea name="intro"></textarea>
            </td>
          </tr>
        </table>
        <div class="buttons">
          <input type="submit" value="가입하기" class="btn" title="가입하기" />
          <input type="submit" value="초기화" class="btn" title="초기화" />
        </div>
      </form>
    </div>

    <script src="sign_up.js"></script>
  </body>
</html>

<!-- 
autcomplete: "off"

유효성 검사: required
-->
