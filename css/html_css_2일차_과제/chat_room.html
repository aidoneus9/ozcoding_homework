<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="IE=edge" />
    <title>chat_room</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbit&display=swap" rel="stylesheet">
    <link href="chat_room.css" rel="stylesheet" />
    <link rel="icon" type="image/png" size="16x16" href="slytherin.png" />
  </head>
  <body>
    <div class="container">
      <main class="chat-screen">
        <section class="chat-screen_bar">
          <div class="user">
            <div class="user_column">
              <div class="user_pic"></div>
            </div>
            <div class="user_column">
              <p class="user_nick">슬리데린 단톡방</p>
              <p class="user_count">36</p>
            </div>
          </div>
        </section>
      </main>
      <form class="chat-form">
        <section class="chat-form_field">
            <textarea class="chat-form_msg"></textarea>
            <button class="chat-form_bt"></button>
        </section>
      </form>
  </body>
</html>
